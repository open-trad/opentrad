# OpenTrad 主 CI：lint / typecheck / test 在三平台（ubuntu/macos/windows）跑。
# 触发（按 kickoff A3 决策）：push main + 所有 pull_request。
# M0 不做 electron-builder 打包和 release 上传，那是 M1 范围。

name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一 branch 的并发 run 互相取消，省资源。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # apps/desktop 的 postinstall 把 better-sqlite3 / node-pty rebuild 成 Electron ABI
      # （让 `pnpm dev` 开箱即用，详见 CONTRIBUTING.md）。CI 跑 vitest 时需要的是
      # 系统 Node ABI，所以在 lint/test 前切回 Node ABI。build:dist（M1 #13）真打包时
      # 再切回 Electron ABI 即可。
      - name: Rebuild native modules for Node ABI (vitest)
        run: pnpm --filter @opentrad/desktop rebuild:node

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm -r --if-present test
