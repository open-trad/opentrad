# OpenTrad release 流水线(M1 #30 Part B / open-trad/opentrad#30)。
#
# **C2 决策(开工前对齐)**:**只在 tag push 触发,不在每个 PR 跑**。
# - 个人 GitHub Free 配额 2000 min/月,三平台 matrix × release 全打包 ≈ 30-45 min/run
# - 日常 PR 走 ci.yml(轻量 lint/typecheck/test 三平台)
# - 真打包仅在 v* tag 触发(发起人手工 push tag)
#
# **D-pre-2 决策**:artifact 上传 GitHub Actions,**不公开 GitHub Release** 页面
# (M1 不公开 v0.1 release,装机几天发现问题再公开,质量更稳)。
#
# **M1 第一段验收**:本流水线在 v0.1.0-rc.1 tag 推后跑通,三平台 artifact 在 Actions
# 产物里能下载。真实应用 e2e 验证(macOS Mac mini / Windows 真机)留等机段。

name: Release

on:
  push:
    tags:
      - 'v*'
  # 手动触发(便于调试 release yml 自身)
  workflow_dispatch:

# CI 全局 env:Playwright 下载由 release 流水线 install 后显式 setup,默认安装时跳过
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # extraResources 需要 Playwright Chromium 在 node_modules 里;
      # 默认 install 时被 PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 跳过,这里显式安装
      - name: Install Playwright Chromium
        run: pnpm --filter @opentrad/browser-tools setup

      # ABI guard(M1 #36 PR A v2 sentinel-based,fresh install 自动跑;
      # 显式调一次保险,确保 Electron ABI 而非 Node ABI)
      - name: Ensure Electron ABI
        run: node apps/desktop/scripts/ensure-electron-abi.cjs

      - name: Build (electron-vite + electron-builder)
        run: pnpm --filter @opentrad/desktop build:dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opentrad-${{ matrix.os }}
          path: |
            apps/desktop/release/**/*.dmg
            apps/desktop/release/**/*.exe
            apps/desktop/release/**/*.AppImage
            apps/desktop/release/**/*.deb
            apps/desktop/release/**/*.zip
          retention-days: 30
          if-no-files-found: error
